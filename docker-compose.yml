services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - internal

volumes:
  uploads:
    driver: local

networks:
  internal:
    driver: bridge
