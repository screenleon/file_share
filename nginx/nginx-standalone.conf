upstream backend {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name _;

    # Disable upload size limit — streaming handles large files
    client_max_body_size 0;

    # Disable request buffering — stream directly to backend
    proxy_request_buffering off;

    # Increase timeouts for large file transfers
    proxy_connect_timeout 300s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    send_timeout 3600s;

    # Frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API — streaming proxy
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable response buffering for streaming downloads
        proxy_buffering off;

        # Disable temp files to prevent disk usage for buffering
        proxy_max_temp_file_size 0;
    }
}
